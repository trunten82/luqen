# Luqen — Standard deployment
# Compliance + Dashboard + Redis (SSE, scan queue) + pa11y webservice + MongoDB
# All-in-one: no external dependencies needed

services:
  mongo:
    image: mongo:7
    container_name: luqen-mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 3s
      retries: 5

  pa11y:
    image: pa11y/pa11y-webservice
    container_name: luqen-pa11y
    ports:
      - "3000:3000"
    environment:
      - DATABASE=mongodb://mongo:27017/pa11y-webservice
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/tasks"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: luqen-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  compliance:
    build:
      context: .
      dockerfile: packages/compliance/Dockerfile
    container_name: luqen-compliance
    ports:
      - "${COMPLIANCE_PORT:-4000}:4000"
    volumes:
      - compliance-data:/app/data
      - compliance-keys:/app/keys
    environment:
      - COMPLIANCE_PORT=4000
      - COMPLIANCE_DB_PATH=/app/data/compliance.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: luqen-dashboard
    ports:
      - "${DASHBOARD_PORT:-5000}:5000"
    volumes:
      - dashboard-data:/app/data
      - dashboard-reports:/app/reports
    environment:
      - DASHBOARD_PORT=5000
      - DASHBOARD_COMPLIANCE_URL=http://compliance:4000
      - DASHBOARD_WEBSERVICE_URL=http://pa11y:3000
      - DASHBOARD_REPORTS_DIR=/app/reports
      - DASHBOARD_DB_PATH=/app/data/dashboard.db
      - DASHBOARD_SESSION_SECRET=${DASHBOARD_SESSION_SECRET}
      - DASHBOARD_REDIS_URL=redis://redis:6379
    depends_on:
      compliance:
        condition: service_healthy
      pa11y:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo-data:
  compliance-data:
  compliance-keys:
  dashboard-data:
  dashboard-reports:
