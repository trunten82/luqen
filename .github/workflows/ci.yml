name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Build compliance
        run: npm run build -w packages/compliance

      - name: Build dashboard
        run: npm run build -w packages/dashboard

      - name: Test core
        run: npm run test -w packages/core

      - name: Test compliance
        run: npm run test -w packages/compliance

      - name: Test dashboard
        run: npm run test -w packages/dashboard

      - name: Lint
        run: npm run lint --workspaces --if-present
