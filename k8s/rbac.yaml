---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pally-compliance
  namespace: pally
  labels:
    app.kubernetes.io/name: pally-compliance
    app.kubernetes.io/part-of: pally-ecosystem
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pally-dashboard
  namespace: pally
  labels:
    app.kubernetes.io/name: pally-dashboard
    app.kubernetes.io/part-of: pally-ecosystem
automountServiceAccountToken: false

---
# Role: minimal permissions — pods only need to read their own config
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pally-pod-reader
  namespace: pally
  labels:
    app.kubernetes.io/part-of: pally-ecosystem
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pally-compliance-pod-reader
  namespace: pally
  labels:
    app.kubernetes.io/part-of: pally-ecosystem
subjects:
  - kind: ServiceAccount
    name: pally-compliance
    namespace: pally
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: pally-pod-reader

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pally-dashboard-pod-reader
  namespace: pally
  labels:
    app.kubernetes.io/part-of: pally-ecosystem
subjects:
  - kind: ServiceAccount
    name: pally-dashboard
    namespace: pally
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: pally-pod-reader
