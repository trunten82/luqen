---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: luqen-compliance
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-compliance
    app.kubernetes.io/part-of: luqen-ecosystem
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: luqen-dashboard
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-dashboard
    app.kubernetes.io/part-of: luqen-ecosystem
automountServiceAccountToken: false

---
# Role: minimal permissions — pods only need to read their own config
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: luqen-pod-reader
  namespace: luqen
  labels:
    app.kubernetes.io/part-of: luqen-ecosystem
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: luqen-compliance-pod-reader
  namespace: luqen
  labels:
    app.kubernetes.io/part-of: luqen-ecosystem
subjects:
  - kind: ServiceAccount
    name: luqen-compliance
    namespace: luqen
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: luqen-pod-reader

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: luqen-dashboard-pod-reader
  namespace: luqen
  labels:
    app.kubernetes.io/part-of: luqen-ecosystem
subjects:
  - kind: ServiceAccount
    name: luqen-dashboard
    namespace: luqen
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: luqen-pod-reader
