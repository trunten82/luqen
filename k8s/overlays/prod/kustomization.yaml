apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit everything from the base and apply prod-specific overrides
bases:
  - ../../

namespace: pally

# Production image tags — set by CI/CD after a successful build:
#   kustomize edit set image \
#     ghcr.io/your-org/pally-compliance:$TAG \
#     ghcr.io/your-org/pally-dashboard:$TAG
images:
  - name: "${REGISTRY}/pally-compliance:${TAG}"
    newName: ghcr.io/your-org/pally-compliance
    newTag: latest
  - name: "${REGISTRY}/pally-dashboard:${TAG}"
    newName: ghcr.io/your-org/pally-dashboard
    newTag: latest

patches:
  # ── Compliance: 3 replicas, higher resource limits ─────────────────────────
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: pally-compliance
        namespace: pally
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: compliance
                resources:
                  requests:
                    memory: "192Mi"
                    cpu: "300m"
                  limits:
                    memory: "512Mi"
                    cpu: "1000m"

  # ── Dashboard: 3 replicas, higher resource limits ──────────────────────────
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: pally-dashboard
        namespace: pally
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: dashboard
                resources:
                  requests:
                    memory: "192Mi"
                    cpu: "300m"
                  limits:
                    memory: "512Mi"
                    cpu: "1000m"

  # ── HPA: higher ceilings for prod load ────────────────────────────────────
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: pally-compliance
        namespace: pally
      spec:
        minReplicas: 3
        maxReplicas: 20

  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: pally-dashboard
        namespace: pally
      spec:
        minReplicas: 3
        maxReplicas: 10

  # ── PVCs: larger storage for prod ─────────────────────────────────────────
  - patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: pally-compliance-data
        namespace: pally
      spec:
        resources:
          requests:
            storage: 20Gi

  # ── Ingress: real TLS hostname ─────────────────────────────────────────────
  # Replace REPLACE_WITH_YOUR_PROD_HOSTNAME with the production FQDN.
  # Replace REPLACE_WITH_TLS_ISSUER with your cert-manager ClusterIssuer name.
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: pally
        namespace: pally
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      spec:
        tls:
          - hosts:
              - REPLACE_WITH_YOUR_PROD_HOSTNAME
            secretName: pally-tls-prod
        rules:
          - host: REPLACE_WITH_YOUR_PROD_HOSTNAME
            http:
              paths:
                - path: /api/docs(/|$)(.*)
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: pally-compliance
                      port:
                        name: http
                - path: /api(/|$)(.*)
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: pally-compliance
                      port:
                        name: http
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: pally-dashboard
                      port:
                        name: http

  # ── ConfigMap: prod CORS origin ────────────────────────────────────────────
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: pally-compliance-config
        namespace: pally
      data:
        COMPLIANCE_CORS_ORIGIN: "https://REPLACE_WITH_YOUR_PROD_HOSTNAME"
        COMPLIANCE_TOKEN_EXPIRY: "30m"
