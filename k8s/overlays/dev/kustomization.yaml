apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit everything from the base and apply dev-specific overrides
bases:
  - ../../

namespace: luqen

# Dev image tags — CI/CD replaces these via `kustomize edit set image`
images:
  - name: "${REGISTRY}/luqen-compliance:${TAG}"
    newName: ghcr.io/your-org/luqen-compliance
    newTag: dev
  - name: "${REGISTRY}/luqen-dashboard:${TAG}"
    newName: ghcr.io/your-org/luqen-dashboard
    newTag: dev

patches:
  # ── Compliance: 1 replica, halved resource limits ──────────────────────────
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: luqen-compliance
        namespace: luqen
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: compliance
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "100m"
                  limits:
                    memory: "128Mi"
                    cpu: "250m"

  # ── Dashboard: 1 replica, halved resource limits ───────────────────────────
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: luqen-dashboard
        namespace: luqen
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: dashboard
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "100m"
                  limits:
                    memory: "128Mi"
                    cpu: "250m"

  # ── HPA: lower min replicas for dev ────────────────────────────────────────
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: luqen-compliance
        namespace: luqen
      spec:
        minReplicas: 1
        maxReplicas: 3

  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: luqen-dashboard
        namespace: luqen
      spec:
        minReplicas: 1
        maxReplicas: 2

  # ── Ingress: no TLS in dev (uses HTTP only) ────────────────────────────────
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: luqen
        namespace: luqen
        annotations:
          cert-manager.io/cluster-issuer: null
          kubernetes.io/ingress.class: "nginx"
      spec:
        tls: []
        rules:
          - host: luqen.dev.local
            http:
              paths:
                - path: /api/docs(/|$)(.*)
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: luqen-compliance
                      port:
                        name: http
                - path: /api(/|$)(.*)
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: luqen-compliance
                      port:
                        name: http
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: luqen-dashboard
                      port:
                        name: http

  # ── ConfigMap: dev CORS origin ─────────────────────────────────────────────
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: luqen-compliance-config
        namespace: luqen
      data:
        COMPLIANCE_CORS_ORIGIN: "http://luqen.dev.local"
