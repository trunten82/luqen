apiVersion: v1
kind: Secret
metadata:
  name: {{ include "luqen.fullname" . }}-secrets
  labels:
    {{- include "luqen.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # -- Session signing secret for the dashboard
  DASHBOARD_SESSION_SECRET: {{ .Values.dashboard.sessionSecret | quote }}

  # -- OAuth2 client credentials for dashboard-to-compliance auth
  {{- if .Values.dashboard.complianceClientId }}
  DASHBOARD_COMPLIANCE_CLIENT_ID: {{ .Values.dashboard.complianceClientId | quote }}
  {{- end }}
  {{- if .Values.dashboard.complianceClientSecret }}
  DASHBOARD_COMPLIANCE_CLIENT_SECRET: {{ .Values.dashboard.complianceClientSecret | quote }}
  {{- end }}

  # -- JWT RSA key pair for compliance service token signing
  COMPLIANCE_JWT_PRIVATE_KEY_CONTENT: {{ .Values.secrets.jwtPrivateKey | quote }}
  COMPLIANCE_JWT_PUBLIC_KEY_CONTENT: {{ .Values.secrets.jwtPublicKey | quote }}

  # -- Database URL (optional, used when dbAdapter is postgres or mongodb)
  {{- if .Values.compliance.dbUrl }}
  COMPLIANCE_DB_URL: {{ .Values.compliance.dbUrl | quote }}
  {{- end }}
