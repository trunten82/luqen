apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "luqen.fullname" . }}-compliance
  labels:
    {{- include "luqen.componentLabels" (dict "component" "compliance" "tier" "backend" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.compliance.replicas }}
  selector:
    matchLabels:
      {{- include "luqen.selectorLabels" (dict "component" "compliance" "root" .) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "luqen.componentLabels" (dict "component" "compliance" "tier" "backend" "root" .) | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "luqen.fullname" . }}-compliance
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "luqen.selectorLabels" (dict "component" "compliance" "root" .) | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: init-keys
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -f /app/keys/private.pem ]; then
                echo "$COMPLIANCE_JWT_PRIVATE_KEY_CONTENT" > /app/keys/private.pem
                chmod 600 /app/keys/private.pem
              fi
              if [ ! -f /app/keys/public.pem ]; then
                echo "$COMPLIANCE_JWT_PUBLIC_KEY_CONTENT" > /app/keys/public.pem
                chmod 644 /app/keys/public.pem
              fi
          env:
            - name: COMPLIANCE_JWT_PRIVATE_KEY_CONTENT
              valueFrom:
                secretKeyRef:
                  name: {{ include "luqen.fullname" . }}-secrets
                  key: COMPLIANCE_JWT_PRIVATE_KEY_CONTENT
            - name: COMPLIANCE_JWT_PUBLIC_KEY_CONTENT
              valueFrom:
                secretKeyRef:
                  name: {{ include "luqen.fullname" . }}-secrets
                  key: COMPLIANCE_JWT_PUBLIC_KEY_CONTENT
          volumeMounts:
            - name: keys
              mountPath: /app/keys
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: compliance
          image: "{{ .Values.compliance.image.repository }}:{{ include "luqen.imageTag" (dict "tag" .Values.compliance.image.tag "global" .Values.global) }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.compliance.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "luqen.fullname" . }}-compliance
          env:
            - name: COMPLIANCE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "luqen.fullname" . }}-secrets
                  key: COMPLIANCE_DB_URL
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.compliance.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: keys
              mountPath: /app/keys
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.compliance.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "luqen.fullname" . }}-compliance-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: keys
          {{- if .Values.compliance.persistence.keys.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "luqen.fullname" . }}-compliance-keys
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
