apiVersion: v1
kind: Service
metadata:
  name: {{ include "luqen.fullname" . }}-compliance
  labels:
    {{- include "luqen.componentLabels" (dict "component" "compliance" "tier" "backend" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "luqen.selectorLabels" (dict "component" "compliance" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.compliance.port }}
      targetPort: http
      protocol: TCP
