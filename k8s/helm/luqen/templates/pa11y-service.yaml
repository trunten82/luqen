{{- if .Values.pa11y.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "luqen.fullname" . }}-webservice
  labels:
    {{- include "luqen.componentLabels" (dict "component" "pa11y" "tier" "scanner" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "luqen.selectorLabels" (dict "component" "pa11y" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.pa11y.port }}
      targetPort: http
      protocol: TCP
{{- end }}
