{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "luqen.fullname" . }}-redis
  labels:
    {{- include "luqen.componentLabels" (dict "component" "redis" "tier" "cache" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "luqen.selectorLabels" (dict "component" "redis" "root" .) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
{{- end }}
