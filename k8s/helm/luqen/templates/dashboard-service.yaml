apiVersion: v1
kind: Service
metadata:
  name: {{ include "luqen.fullname" . }}-dashboard
  labels:
    {{- include "luqen.componentLabels" (dict "component" "dashboard" "tier" "frontend" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "luqen.selectorLabels" (dict "component" "dashboard" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: http
      protocol: TCP
