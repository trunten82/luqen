apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pally-compliance
  namespace: pally
  labels:
    app.kubernetes.io/name: pally-compliance
    app.kubernetes.io/part-of: pally-ecosystem
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pally-compliance
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
