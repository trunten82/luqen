apiVersion: v1
kind: Secret
metadata:
  name: luqen-compliance-secret
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-compliance
    app.kubernetes.io/part-of: luqen-ecosystem
  annotations:
    # IMPORTANT: Replace all placeholder values before deploying.
    # For production, manage this secret with a secret manager
    # (e.g. Sealed Secrets, External Secrets Operator, Vault Agent).
type: Opaque
stringData:
  # Database connection URL (used when COMPLIANCE_DB_ADAPTER=postgres or mongodb)
  # Example PostgreSQL: postgresql://user:password@host:5432/dbname
  # Example MongoDB:    mongodb://user:password@host:27017/dbname
  COMPLIANCE_DB_URL: "REPLACE_WITH_DATABASE_URL"

  # JWT RSA private key in PEM format (base64-encoded or raw PEM string).
  # Generate with: openssl genrsa -out private.pem 4096
  # This secret is written to the keys PVC by an init container in production.
  # Alternatively, mount the key files from a Vault-injected volume.
  COMPLIANCE_JWT_PRIVATE_KEY_CONTENT: "REPLACE_WITH_RSA_PRIVATE_KEY_PEM"

  # JWT RSA public key in PEM format.
  # Generate with: openssl rsa -in private.pem -pubout -out public.pem
  COMPLIANCE_JWT_PUBLIC_KEY_CONTENT: "REPLACE_WITH_RSA_PUBLIC_KEY_PEM"
