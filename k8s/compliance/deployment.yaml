apiVersion: apps/v1
kind: Deployment
metadata:
  name: luqen-compliance
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-compliance
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: luqen-ecosystem
    app.kubernetes.io/version: "${TAG}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: luqen-compliance
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: luqen-compliance
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: luqen-ecosystem
        app.kubernetes.io/version: "${TAG}"
    spec:
      serviceAccountName: luqen-compliance
      automountServiceAccountToken: false

      # Ensure pods are spread across different nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: luqen-compliance
                topologyKey: kubernetes.io/hostname

      # Init container: write JWT keys from secret into the keys PVC
      initContainers:
        - name: init-keys
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -f /app/keys/private.pem ]; then
                echo "$COMPLIANCE_JWT_PRIVATE_KEY_CONTENT" > /app/keys/private.pem
                chmod 600 /app/keys/private.pem
              fi
              if [ ! -f /app/keys/public.pem ]; then
                echo "$COMPLIANCE_JWT_PUBLIC_KEY_CONTENT" > /app/keys/public.pem
                chmod 644 /app/keys/public.pem
              fi
          env:
            - name: COMPLIANCE_JWT_PRIVATE_KEY_CONTENT
              valueFrom:
                secretKeyRef:
                  name: luqen-compliance-secret
                  key: COMPLIANCE_JWT_PRIVATE_KEY_CONTENT
            - name: COMPLIANCE_JWT_PUBLIC_KEY_CONTENT
              valueFrom:
                secretKeyRef:
                  name: luqen-compliance-secret
                  key: COMPLIANCE_JWT_PUBLIC_KEY_CONTENT
          volumeMounts:
            - name: keys
              mountPath: /app/keys
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: compliance
          # Image is parameterized for CI/CD substitution:
          #   REGISTRY — e.g. ghcr.io/your-org
          #   TAG      — git SHA or semver tag
          image: "${REGISTRY}/luqen-compliance:${TAG}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP

          # Load non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: luqen-compliance-config

          # Load secret env vars individually so they are not accidentally logged
          env:
            - name: COMPLIANCE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: luqen-compliance-secret
                  key: COMPLIANCE_DB_URL
                  # optional: true when using SQLite (COMPLIANCE_DB_ADAPTER=sqlite)
                  optional: true

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: keys
              mountPath: /app/keys
              readOnly: true
            # Writable tmp directory required by Node.js at runtime
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: luqen-compliance-data
        - name: keys
          persistentVolumeClaim:
            claimName: luqen-compliance-keys
        - name: tmp
          emptyDir: {}

      securityContext:
        fsGroup: 1000

      terminationGracePeriodSeconds: 30
