apiVersion: v1
kind: Service
metadata:
  name: pally-redis
  namespace: pally
  labels:
    app.kubernetes.io/name: pally-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: pally-ecosystem
spec:
  selector:
    app.kubernetes.io/name: pally-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  # ClusterIP only — Redis should not be exposed outside the cluster
  type: ClusterIP
