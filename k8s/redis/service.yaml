apiVersion: v1
kind: Service
metadata:
  name: luqen-redis
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: luqen-ecosystem
spec:
  selector:
    app.kubernetes.io/name: luqen-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  # ClusterIP only — Redis should not be exposed outside the cluster
  type: ClusterIP
