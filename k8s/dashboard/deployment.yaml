apiVersion: apps/v1
kind: Deployment
metadata:
  name: luqen-dashboard
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-dashboard
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: luqen-ecosystem
    app.kubernetes.io/version: "${TAG}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: luqen-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: luqen-dashboard
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: luqen-ecosystem
        app.kubernetes.io/version: "${TAG}"
    spec:
      serviceAccountName: luqen-dashboard
      automountServiceAccountToken: false

      # Ensure pods are spread across different nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: luqen-dashboard
                topologyKey: kubernetes.io/hostname

      # Wait for the compliance service to be resolvable before starting
      initContainers:
        - name: wait-for-compliance
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://luqen-compliance:4000/api/v1/health; do
                echo "Waiting for compliance service..."
                sleep 3
              done
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: dashboard
          # Image is parameterized for CI/CD substitution:
          #   REGISTRY — e.g. ghcr.io/your-org
          #   TAG      — git SHA or semver tag
          image: "${REGISTRY}/luqen-dashboard:${TAG}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # Load non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: luqen-dashboard-config

          # Load secrets individually
          env:
            - name: DASHBOARD_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: luqen-dashboard-secret
                  key: DASHBOARD_SESSION_SECRET
            - name: DASHBOARD_COMPLIANCE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: luqen-dashboard-secret
                  key: DASHBOARD_COMPLIANCE_CLIENT_ID
                  optional: true
            - name: DASHBOARD_COMPLIANCE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: luqen-dashboard-secret
                  key: DASHBOARD_COMPLIANCE_CLIENT_SECRET
                  optional: true

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: reports
              mountPath: /app/reports
            # Writable tmp directory required by Node.js at runtime
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: data
          emptyDir: {}
        - name: reports
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      securityContext:
        fsGroup: 1000

      terminationGracePeriodSeconds: 30
