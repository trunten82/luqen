apiVersion: v1
kind: Service
metadata:
  name: luqen-dashboard
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-dashboard
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: luqen-ecosystem
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: luqen-dashboard
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP
