apiVersion: v1
kind: Secret
metadata:
  name: luqen-dashboard-secret
  namespace: luqen
  labels:
    app.kubernetes.io/name: luqen-dashboard
    app.kubernetes.io/part-of: luqen-ecosystem
  annotations:
    # IMPORTANT: Replace all placeholder values before deploying.
    # For production, manage this secret with a secret manager
    # (e.g. Sealed Secrets, External Secrets Operator, Vault Agent).
type: Opaque
stringData:
  # Session signing secret — must be at least 32 characters.
  # Generate with: openssl rand -hex 32
  DASHBOARD_SESSION_SECRET: "REPLACE_WITH_AT_LEAST_32_CHAR_RANDOM_STRING"

  # OAuth2 / API client credentials issued by the compliance service
  # for dashboard-to-compliance authenticated requests.
  # Create a service account in the compliance API and paste the credentials here.
  DASHBOARD_COMPLIANCE_CLIENT_ID: "REPLACE_WITH_COMPLIANCE_CLIENT_ID"
  DASHBOARD_COMPLIANCE_CLIENT_SECRET: "REPLACE_WITH_COMPLIANCE_CLIENT_SECRET"
