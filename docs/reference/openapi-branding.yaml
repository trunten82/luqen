openapi: 3.1.0
info:
  title: Luqen Branding Service
  description: >-
    Brand compliance engine — define brand guidelines (colors, fonts, CSS
    selectors) per organization, assign them to sites, and match scan issues
    against those guidelines to classify findings as brand-related or
    unexpected.


    The branding service is a standalone microservice (port 4100 by default)
    with its own SQLite database, OAuth token issuance, and CLI. The dashboard
    integrates with it via OAuth client credentials.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:4100
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: health
    description: Service health
  - name: oauth
    description: OAuth 2.0 token endpoints
  - name: guidelines
    description: Branding guideline CRUD
  - name: colors
    description: Color entries within a guideline
  - name: fonts
    description: Font entries within a guideline
  - name: selectors
    description: CSS selector entries within a guideline
  - name: sites
    description: Site assignments for a guideline
  - name: matching
    description: Issue-to-guideline matching
  - name: templates
    description: Download import templates

paths:
  # ────────────────────────────────────────────────────────────────────────────
  # Health
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/health:
    get:
      operationId: getBrandingHealth
      tags: [health]
      summary: Health check
      description: Returns service health, version, and current timestamp. No auth required.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "1.0.0"
                timestamp: "2026-03-20T12:00:00.000Z"

  # ────────────────────────────────────────────────────────────────────────────
  # OAuth
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/oauth/token:
    post:
      operationId: createBrandingToken
      tags: [oauth]
      summary: Obtain an access token
      description: >-
        Exchange OAuth 2.0 client credentials for a signed JWT bearer token.
        The token is valid for 1 hour and must be passed in the `Authorization`
        header on all other endpoints.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
            example:
              grant_type: client_credentials
              client_id: dashboard
              client_secret: secret
              scope: read
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
              example:
                access_token: eyJhbGciOiJSUzI1NiJ9...
                token_type: Bearer
                expires_in: 3600
                scope: read
        "400":
          description: Missing or invalid grant_type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ────────────────────────────────────────────────────────────────────────────
  # Guidelines
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/guidelines:
    get:
      operationId: listGuidelines
      tags: [guidelines]
      summary: List branding guidelines
      description: >-
        Returns all guidelines accessible to the caller. Pass `orgId` to scope
        results to a specific organization. Without `orgId`, returns all
        guidelines (requires `admin` scope).
      parameters:
        - name: orgId
          in: query
          required: false
          description: Filter by organization ID.
          schema:
            type: string
      responses:
        "200":
          description: List of guidelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GuidelineSummary"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createGuideline
      tags: [guidelines]
      summary: Create a branding guideline
      description: >-
        Creates a new branding guideline for an organization. Requires `write`
        scope. A guideline groups colors, fonts, and CSS selectors that
        represent a site's brand identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuidelineCreate"
            example:
              name: Campari Group Main Brand
              orgId: campari
              description: Primary brand guidelines for all Campari Group digital properties
      responses:
        "201":
          description: Guideline created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guideline"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/guidelines/{id}:
    get:
      operationId: getGuideline
      tags: [guidelines]
      summary: Get a guideline with full detail
      description: >-
        Returns the guideline with its associated colors, fonts, and CSS
        selectors. Requires `read` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      responses:
        "200":
          description: Guideline with colors, fonts, and selectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guideline"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateGuideline
      tags: [guidelines]
      summary: Update a guideline
      description: >-
        Replaces the guideline's top-level fields (name, description). Does not
        affect colors, fonts, or selectors — use the sub-resource endpoints for
        those. Requires `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuidelineUpdate"
      responses:
        "200":
          description: Guideline updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guideline"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteGuideline
      tags: [guidelines]
      summary: Delete a guideline
      description: >-
        Permanently deletes the guideline and all associated colors, fonts,
        selectors, and site assignments. Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      responses:
        "204":
          description: Guideline deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────────────────────────────────────
  # Colors
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/guidelines/{id}/colors:
    post:
      operationId: addColor
      tags: [colors]
      summary: Add a color to a guideline
      description: >-
        Adds a brand color entry to the guideline. Colors are matched against
        scan issues using a Delta-E perceptual distance algorithm. Both
        foreground and background variants are stored as a pair. Requires
        `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColorCreate"
            example:
              label: Brand Red
              foreground: "#CC0000"
              background: "#FFFFFF"
              role: primary
      responses:
        "201":
          description: Color added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColorEntry"
        "400":
          description: Invalid hex color or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/guidelines/{id}/colors/{colorId}:
    delete:
      operationId: removeColor
      tags: [colors]
      summary: Remove a color from a guideline
      description: Removes the specified color entry. Requires `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
        - $ref: "#/components/parameters/ColorId"
      responses:
        "204":
          description: Color removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────────────────────────────────────
  # Fonts
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/guidelines/{id}/fonts:
    post:
      operationId: addFont
      tags: [fonts]
      summary: Add a font to a guideline
      description: >-
        Adds a brand font entry to the guideline. Fonts are matched against
        scan issues using normalized family name comparison. Requires `write`
        scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FontCreate"
            example:
              family: Helvetica Neue
              variants: ["400", "700", "italic"]
              role: body
      responses:
        "201":
          description: Font added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FontEntry"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/guidelines/{id}/fonts/{fontId}:
    delete:
      operationId: removeFont
      tags: [fonts]
      summary: Remove a font from a guideline
      description: Removes the specified font entry. Requires `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
        - $ref: "#/components/parameters/FontId"
      responses:
        "204":
          description: Font removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────────────────────────────────────
  # Selectors
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/guidelines/{id}/selectors:
    post:
      operationId: addSelector
      tags: [selectors]
      summary: Add a CSS selector to a guideline
      description: >-
        Adds a CSS selector pattern to the guideline. Selectors are matched
        against the `selector` field of scan issues using substring and prefix
        matching. Requires `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectorCreate"
            example:
              pattern: ".brand-header"
              description: Top navigation bar
      responses:
        "201":
          description: Selector added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelectorEntry"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/guidelines/{id}/selectors/{selectorId}:
    delete:
      operationId: removeSelector
      tags: [selectors]
      summary: Remove a CSS selector from a guideline
      description: Removes the specified selector entry. Requires `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
        - $ref: "#/components/parameters/SelectorId"
      responses:
        "204":
          description: Selector removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────────────────────────────────────
  # Sites
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/guidelines/{id}/sites:
    get:
      operationId: listGuidelineSites
      tags: [sites]
      summary: List site assignments for a guideline
      description: >-
        Returns all sites assigned to this guideline. When a scan runs for an
        assigned site, its issues are automatically matched against the
        guideline. Requires `read` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      responses:
        "200":
          description: List of site assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SiteAssignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: assignSite
      tags: [sites]
      summary: Assign a site to a guideline
      description: >-
        Associates a site URL with this guideline. A site can be assigned to
        multiple guidelines. When branding enrichment runs during a scan,
        all guidelines assigned to the site are evaluated. Requires `write`
        scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteAssignRequest"
            example:
              siteUrl: https://www.campari.com
      responses:
        "201":
          description: Site assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAssignment"
        "400":
          description: Missing or invalid siteUrl
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Site already assigned to this guideline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unassignSite
      tags: [sites]
      summary: Unassign a site from a guideline
      description: >-
        Removes the site-to-guideline association. Does not delete the guideline
        or any scan data. Requires `write` scope.
      parameters:
        - $ref: "#/components/parameters/GuidelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteAssignRequest"
            example:
              siteUrl: https://www.campari.com
      responses:
        "204":
          description: Site unassigned
        "400":
          description: Missing siteUrl
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────────────────────────────────────
  # Matching
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/match:
    post:
      operationId: matchIssues
      tags: [matching]
      summary: Match issues against branding guidelines
      description: >-
        Given a list of accessibility issues from a scan, returns each issue
        annotated with branding match information. The matcher applies three
        strategies in order:


        1. **Color-pair matching** — checks if the foreground/background color
           pair extracted from the issue CSS context matches a brand color pair
           within a perceptual tolerance (Delta-E ≤ 5.0).

        2. **Font matching** — checks if the `font-family` value in the issue
           CSS context matches a brand font by normalized family name.

        3. **Selector matching** — checks if the issue's CSS selector contains
           or starts with a brand selector pattern.


        An issue is considered "brand-related" if any strategy matches. The
        response includes the matched guideline ID, matched strategy, and
        relevant detail per issue. Requires `read` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchRequest"
            example:
              siteUrl: https://www.campari.com
              orgId: campari
              issues:
                - code: WCAG2AA.Principle1.Guideline1_4.1_4_3.G18.Fail
                  type: error
                  message: "This element has insufficient colour contrast ratio."
                  selector: ".brand-header h1"
                  context: "<h1 class=\"brand-header\">Welcome</h1>"
      responses:
        "200":
          description: Issues annotated with branding match results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResponse"
        "400":
          description: Missing required fields (issues, siteUrl, orgId)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ────────────────────────────────────────────────────────────────────────────
  # Templates
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/templates/csv:
    get:
      operationId: getCsvTemplate
      tags: [templates]
      summary: Download CSV import template
      description: >-
        Returns a CSV file with the correct column headers and one example row
        for bulk-importing branding guidelines. Import via the dashboard UI or
        the `luqen-branding` CLI. Requires `read` scope.
      responses:
        "200":
          description: CSV template file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/templates/json:
    get:
      operationId: getJsonTemplate
      tags: [templates]
      summary: Download JSON import template
      description: >-
        Returns a JSON file showing the expected structure for bulk-importing
        branding guidelines programmatically. Requires `read` scope.
      responses:
        "200":
          description: JSON template file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuidelineImportTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"

# ==============================================================================
# Components
# ==============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer JWT obtained from `POST /api/v1/oauth/token` using client
        credentials. Pass in the `Authorization: Bearer <token>` header.

  parameters:
    GuidelineId:
      name: id
      in: path
      required: true
      description: Branding guideline UUID.
      schema:
        type: string
        format: uuid

    ColorId:
      name: colorId
      in: path
      required: true
      description: Color entry UUID.
      schema:
        type: string
        format: uuid

    FontId:
      name: fontId
      in: path
      required: true
      description: Font entry UUID.
      schema:
        type: string
        format: uuid

    SelectorId:
      name: selectorId
      in: path
      required: true
      description: Selector entry UUID.
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Health ─────────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "1.0.0"
        timestamp:
          type: string
          format: date-time

    # ── OAuth ──────────────────────────────────────────────────────────────────
    TokenRequest:
      type: object
      required: [grant_type, client_id, client_secret]
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
        client_id:
          type: string
        client_secret:
          type: string
        scope:
          type: string
          description: Space-separated list of scopes (read, write, admin).
          example: read

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Signed JWT bearer token.
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds.
          example: 3600
        scope:
          type: string
          example: read

    # ── Guidelines ─────────────────────────────────────────────────────────────
    GuidelineSummary:
      type: object
      required: [id, name, orgId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Campari Group Main Brand
        orgId:
          type: string
          example: campari
        description:
          type: string
          nullable: true
        colorCount:
          type: integer
          description: Number of color pairs in this guideline.
        fontCount:
          type: integer
          description: Number of font families in this guideline.
        selectorCount:
          type: integer
          description: Number of CSS selector patterns in this guideline.
        siteCount:
          type: integer
          description: Number of sites assigned to this guideline.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Guideline:
      allOf:
        - $ref: "#/components/schemas/GuidelineSummary"
        - type: object
          properties:
            colors:
              type: array
              items:
                $ref: "#/components/schemas/ColorEntry"
            fonts:
              type: array
              items:
                $ref: "#/components/schemas/FontEntry"
            selectors:
              type: array
              items:
                $ref: "#/components/schemas/SelectorEntry"

    GuidelineCreate:
      type: object
      required: [name, orgId]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        orgId:
          type: string
          description: Organization that owns this guideline.
        description:
          type: string
          nullable: true

    GuidelineUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true

    # ── Colors ─────────────────────────────────────────────────────────────────
    ColorEntry:
      type: object
      required: [id, guidelineId, foreground, background, createdAt]
      properties:
        id:
          type: string
          format: uuid
        guidelineId:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
          example: Brand Red
        foreground:
          type: string
          description: Foreground hex color (e.g. #CC0000).
          pattern: "^#[0-9A-Fa-f]{6}$"
          example: "#CC0000"
        background:
          type: string
          description: Background hex color (e.g. #FFFFFF).
          pattern: "^#[0-9A-Fa-f]{6}$"
          example: "#FFFFFF"
        role:
          type: string
          nullable: true
          description: Semantic role (e.g. primary, secondary, cta).
          example: primary
        createdAt:
          type: string
          format: date-time

    ColorCreate:
      type: object
      required: [foreground, background]
      properties:
        label:
          type: string
          nullable: true
        foreground:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          example: "#CC0000"
        background:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          example: "#FFFFFF"
        role:
          type: string
          nullable: true

    # ── Fonts ──────────────────────────────────────────────────────────────────
    FontEntry:
      type: object
      required: [id, guidelineId, family, createdAt]
      properties:
        id:
          type: string
          format: uuid
        guidelineId:
          type: string
          format: uuid
        family:
          type: string
          description: CSS font-family name.
          example: Helvetica Neue
        variants:
          type: array
          items:
            type: string
          description: Font weights/styles (e.g. "400", "700", "italic").
          example: ["400", "700"]
        role:
          type: string
          nullable: true
          description: Semantic role (e.g. heading, body, caption).
          example: body
        createdAt:
          type: string
          format: date-time

    FontCreate:
      type: object
      required: [family]
      properties:
        family:
          type: string
        variants:
          type: array
          items:
            type: string
          default: []
        role:
          type: string
          nullable: true

    # ── Selectors ──────────────────────────────────────────────────────────────
    SelectorEntry:
      type: object
      required: [id, guidelineId, pattern, createdAt]
      properties:
        id:
          type: string
          format: uuid
        guidelineId:
          type: string
          format: uuid
        pattern:
          type: string
          description: CSS selector pattern (substring or prefix matched against issue selectors).
          example: ".brand-header"
        description:
          type: string
          nullable: true
          example: Top navigation bar
        createdAt:
          type: string
          format: date-time

    SelectorCreate:
      type: object
      required: [pattern]
      properties:
        pattern:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true

    # ── Sites ──────────────────────────────────────────────────────────────────
    SiteAssignment:
      type: object
      required: [id, guidelineId, siteUrl, createdAt]
      properties:
        id:
          type: string
          format: uuid
        guidelineId:
          type: string
          format: uuid
        siteUrl:
          type: string
          format: uri
          example: https://www.campari.com
        createdAt:
          type: string
          format: date-time

    SiteAssignRequest:
      type: object
      required: [siteUrl]
      properties:
        siteUrl:
          type: string
          format: uri

    # ── Matching ───────────────────────────────────────────────────────────────
    MatchRequest:
      type: object
      required: [issues, siteUrl, orgId]
      properties:
        issues:
          type: array
          description: Accessibility issues from a pa11y/axe scan.
          items:
            $ref: "#/components/schemas/ScanIssue"
        siteUrl:
          type: string
          format: uri
          description: URL of the site that was scanned (used to look up assigned guidelines).
        orgId:
          type: string
          description: Organization ID to scope guideline lookup.

    ScanIssue:
      type: object
      required: [code, type, message]
      properties:
        code:
          type: string
          example: WCAG2AA.Principle1.Guideline1_4.1_4_3.G18.Fail
        type:
          type: string
          enum: [error, warning, notice]
        message:
          type: string
        selector:
          type: string
          nullable: true
          description: CSS selector path to the offending element.
          example: ".brand-header h1"
        context:
          type: string
          nullable: true
          description: HTML snippet of the offending element.

    MatchResponse:
      type: object
      required: [annotatedIssues, summary]
      properties:
        annotatedIssues:
          type: array
          items:
            $ref: "#/components/schemas/AnnotatedIssue"
        summary:
          $ref: "#/components/schemas/MatchSummary"

    AnnotatedIssue:
      allOf:
        - $ref: "#/components/schemas/ScanIssue"
        - type: object
          properties:
            brandingMatch:
              nullable: true
              description: Null when the issue does not match any brand guideline.
              oneOf:
                - $ref: "#/components/schemas/BrandingMatch"

    BrandingMatch:
      type: object
      required: [guidelineId, strategy]
      properties:
        guidelineId:
          type: string
          format: uuid
          description: ID of the matched guideline.
        guidelineName:
          type: string
        strategy:
          type: string
          enum: [color, font, selector]
          description: Which matching strategy identified the issue as brand-related.
        detail:
          type: string
          nullable: true
          description: >-
            Human-readable match detail. For color: matched color label and
            Delta-E score. For font: matched family name. For selector: matched
            pattern.
          example: "Brand Red (#CC0000 / #FFFFFF, ΔE=2.3)"

    MatchSummary:
      type: object
      required: [total, brandRelated, unexpected]
      properties:
        total:
          type: integer
          description: Total number of issues evaluated.
        brandRelated:
          type: integer
          description: Issues that matched at least one brand guideline.
        unexpected:
          type: integer
          description: Issues that did not match any brand guideline.
        byStrategy:
          type: object
          properties:
            color:
              type: integer
            font:
              type: integer
            selector:
              type: integer

    # ── Templates ──────────────────────────────────────────────────────────────
    GuidelineImportTemplate:
      type: object
      description: Example structure for JSON bulk-import of branding guidelines.
      properties:
        guidelines:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              orgId:
                type: string
              description:
                type: string
              colors:
                type: array
                items:
                  $ref: "#/components/schemas/ColorCreate"
              fonts:
                type: array
                items:
                  $ref: "#/components/schemas/FontCreate"
              selectors:
                type: array
                items:
                  $ref: "#/components/schemas/SelectorCreate"
              sites:
                type: array
                items:
                  type: string
                  format: uri
                description: Site URLs to assign on creation.

    # ── Error ──────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
