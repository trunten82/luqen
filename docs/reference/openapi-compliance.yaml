openapi: 3.1.0
info:
  title: Pally Compliance Service
  description: >-
    Accessibility compliance rule engine — check WCAG issues against 60+
    country-specific legal requirements. Provides CRUD for jurisdictions,
    regulations, and requirements, a compliance checker, update proposal
    workflow, monitored sources, webhooks, user/client management, and OAuth
    token issuance.
  version: 0.1.0
  license:
    name: MIT

servers:
  - url: http://localhost:4000
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: health
    description: Service health
  - name: oauth
    description: OAuth 2.0 token endpoints
  - name: jurisdictions
    description: Jurisdiction CRUD
  - name: regulations
    description: Regulation CRUD
  - name: requirements
    description: Requirement CRUD
  - name: compliance
    description: Compliance checking engine
  - name: updates
    description: Update proposal workflow
  - name: sources
    description: Monitored source management
  - name: webhooks
    description: Webhook management
  - name: users
    description: User management
  - name: clients
    description: OAuth client management
  - name: seed
    description: Baseline data seeding
  - name: orgs
    description: Organization data management

paths:
  # ────────────────────────────────────────────────────────────────────────────
  # Health
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health check
      description: Returns service health, version, and current timestamp. No auth required.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "0.1.0"
                timestamp: "2026-03-20T12:00:00.000Z"

  # ────────────────────────────────────────────────────────────────────────────
  # OAuth
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/oauth/token:
    post:
      operationId: createToken
      tags: [oauth]
      summary: Obtain an access token
      description: >-
        Supports `client_credentials` and `password` grant types.
        Client credentials may be supplied via Basic auth header or body params.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
            examples:
              clientCredentials:
                summary: Client credentials grant
                value:
                  grant_type: client_credentials
                  client_id: my-client
                  client_secret: s3cret
                  scope: read write
              password:
                summary: Password grant
                value:
                  grant_type: password
                  username: admin
                  password: hunter2
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
              example:
                access_token: eyJhbGciOiJSUzI1NiIs...
                token_type: Bearer
                expires_in: 3600
                scope: read write
        "400":
          description: Bad request (unsupported grant type, invalid scope, missing fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid client or user credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/oauth/revoke:
    post:
      operationId: revokeToken
      tags: [oauth]
      summary: Revoke a token (best-effort, stateless)
      description: >-
        Stateless JWT implementation — always returns 200. Provided for
        RFC 7009 compatibility.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Revocation acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
              example:
                revoked: true

  # ────────────────────────────────────────────────────────────────────────────
  # Jurisdictions
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/jurisdictions:
    get:
      operationId: listJurisdictions
      tags: [jurisdictions]
      summary: List jurisdictions
      description: Returns a paginated list of jurisdictions, optionally filtered.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: type
          in: query
          schema:
            type: string
            enum: [supranational, country, state]
        - name: parentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated jurisdiction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedJurisdictions"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createJurisdiction
      tags: [jurisdictions]
      summary: Create a jurisdiction
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJurisdictionInput"
      responses:
        "201":
          description: Jurisdiction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Jurisdiction"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/jurisdictions/{id}:
    get:
      operationId: getJurisdiction
      tags: [jurisdictions]
      summary: Get a jurisdiction by ID
      description: Returns the jurisdiction with a `regulationsCount` field.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Jurisdiction found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Jurisdiction"
                  - type: object
                    properties:
                      regulationsCount:
                        type: integer
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateJurisdiction
      tags: [jurisdictions]
      summary: Partially update a jurisdiction
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJurisdictionInput"
      responses:
        "200":
          description: Jurisdiction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Jurisdiction"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteJurisdiction
      tags: [jurisdictions]
      summary: Delete a jurisdiction
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Jurisdiction deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Regulations
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/regulations:
    get:
      operationId: listRegulations
      tags: [regulations]
      summary: List regulations
      parameters:
        - $ref: "#/components/parameters/XOrgId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: jurisdictionId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, draft, repealed]
        - name: scope
          in: query
          schema:
            type: string
            enum: [public, private, all]
      responses:
        "200":
          description: Paginated regulation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRegulations"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createRegulation
      tags: [regulations]
      summary: Create a regulation
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegulationInput"
      responses:
        "201":
          description: Regulation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Regulation"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/regulations/{id}:
    get:
      operationId: getRegulation
      tags: [regulations]
      summary: Get a regulation by ID
      description: Returns the regulation with its nested `requirements` array.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Regulation with requirements
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Regulation"
                  - type: object
                    properties:
                      requirements:
                        type: array
                        items:
                          $ref: "#/components/schemas/Requirement"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateRegulation
      tags: [regulations]
      summary: Partially update a regulation
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRegulationInput"
      responses:
        "200":
          description: Regulation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Regulation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteRegulation
      tags: [regulations]
      summary: Delete a regulation
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Regulation deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Requirements
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/requirements:
    get:
      operationId: listRequirements
      tags: [requirements]
      summary: List requirements
      parameters:
        - $ref: "#/components/parameters/XOrgId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: regulationId
          in: query
          schema:
            type: string
        - name: wcagCriterion
          in: query
          schema:
            type: string
        - name: obligation
          in: query
          schema:
            type: string
            enum: [mandatory, recommended, optional]
      responses:
        "200":
          description: Paginated requirement list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRequirements"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createRequirement
      tags: [requirements]
      summary: Create a requirement
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequirementInput"
      responses:
        "201":
          description: Requirement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/requirements/bulk:
    post:
      operationId: bulkCreateRequirements
      tags: [requirements]
      summary: Bulk-create requirements
      description: >-
        Accepts either a JSON array or `{ requirements: [...] }`. Requires
        `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  items:
                    $ref: "#/components/schemas/CreateRequirementInput"
                - type: object
                  properties:
                    requirements:
                      type: array
                      items:
                        $ref: "#/components/schemas/CreateRequirementInput"
                  required: [requirements]
      responses:
        "201":
          description: Requirements created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Requirement"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/requirements/{id}:
    get:
      operationId: getRequirement
      tags: [requirements]
      summary: Get a requirement by ID
      description: Returns the requirement with its parent `regulation` object.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Requirement with regulation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Requirement"
                  - type: object
                    properties:
                      regulation:
                        $ref: "#/components/schemas/Regulation"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateRequirement
      tags: [requirements]
      summary: Partially update a requirement
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequirementInput"
      responses:
        "200":
          description: Requirement updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteRequirement
      tags: [requirements]
      summary: Delete a requirement
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Requirement deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Compliance
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/compliance/check:
    post:
      operationId: checkCompliance
      tags: [compliance]
      summary: Check WCAG issues against jurisdictional requirements
      description: >-
        Accepts a list of jurisdictions and accessibility issues, returns a
        compliance matrix with per-jurisdiction and per-regulation results plus
        annotated issues. Results may be cached (Redis) — check the `X-Cache`
        response header for `HIT` or `MISS`.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceCheckRequest"
            example:
              jurisdictions: [eu, us-ca]
              issues:
                - code: WCAG2AA.Principle1.Guideline1_1.1_1_1.H37
                  type: error
                  message: Img element missing an alt attribute
                  selector: "#hero img"
                  context: "<img src=\"hero.jpg\">"
              includeOptional: false
              sectors: [public]
      responses:
        "200":
          description: Compliance check result
          headers:
            X-Cache:
              description: Cache status — `HIT` if served from cache, `MISS` if freshly computed.
              schema:
                type: string
                enum: [HIT, MISS]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceCheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Updates (proposals)
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/updates:
    get:
      operationId: listUpdateProposals
      tags: [updates]
      summary: List update proposals
      parameters:
        - $ref: "#/components/parameters/XOrgId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Paginated update proposal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUpdateProposals"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/updates/propose:
    post:
      operationId: proposeUpdate
      tags: [updates]
      summary: Create an update proposal
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUpdateProposalInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProposal"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/updates/{id}:
    get:
      operationId: getUpdateProposal
      tags: [updates]
      summary: Get an update proposal by ID
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Update proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProposal"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/updates/{id}/approve:
    patch:
      operationId: approveUpdateProposal
      tags: [updates]
      summary: Approve an update proposal
      description: Requires `admin` scope. Sets `reviewedBy` from the token subject.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Proposal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProposal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/updates/{id}/reject:
    patch:
      operationId: rejectUpdateProposal
      tags: [updates]
      summary: Reject an update proposal
      description: Requires `admin` scope. Sets `reviewedBy` from the token subject.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Proposal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProposal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────────────────────────────────────
  # Monitored Sources
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/sources:
    get:
      operationId: listSources
      tags: [sources]
      summary: List monitored sources
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Source list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonitoredSource"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createSource
      tags: [sources]
      summary: Create a monitored source
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceInput"
      responses:
        "201":
          description: Source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoredSource"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/sources/{id}:
    delete:
      operationId: deleteSource
      tags: [sources]
      summary: Delete a monitored source
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Source deleted
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/sources/scan:
    post:
      operationId: scanSources
      tags: [sources]
      summary: Trigger a scan of all monitored sources
      description: >-
        Fetches each monitored source, computes a SHA-256 content hash, and
        creates update proposals for any sources whose content has changed.
        Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSourcesResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Webhooks
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List webhooks
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Create a webhook
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookInput"
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Delete a webhook
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Webhook deleted
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/webhooks/{id}/test:
    post:
      operationId: testWebhook
      tags: [webhooks]
      summary: Send a test payload to a webhook
      description: >-
        Delivers a `webhook.test` event to the webhook URL and reports the
        HTTP status. Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Test delivery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Users
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      description: Returns users without `passwordHash`. Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSafe"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created (without passwordHash)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSafe"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/users/{id}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a user
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: User deactivated
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # OAuth Clients
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List OAuth clients
      description: Returns clients without `secretHash`. Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthClientSafe"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createClient
      tags: [clients]
      summary: Create an OAuth client
      description: >-
        Returns the client with a plain-text `secret` field (only shown on
        creation). Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientInput"
      responses:
        "201":
          description: Client created with secret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OAuthClientSafe"
                  - type: object
                    properties:
                      secret:
                        type: string
                        description: Plain-text secret — only returned on creation.
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/clients/{id}/revoke:
    post:
      operationId: revokeClient
      tags: [clients]
      summary: Revoke (delete) an OAuth client
      description: Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Client revoked
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Seed
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/seed:
    post:
      operationId: seedBaseline
      tags: [seed]
      summary: Load baseline seed data
      description: >-
        Loads the built-in baseline jurisdictions, regulations, and
        requirements. Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Seed completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/seed/status:
    get:
      operationId: getSeedStatus
      tags: [seed]
      summary: Get seed status
      description: Returns counts of seeded entities.
      parameters:
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "200":
          description: Seed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedStatus"
        "500":
          $ref: "#/components/responses/InternalError"

  # ────────────────────────────────────────────────────────────────────────────
  # Orgs
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/orgs/{id}/data:
    delete:
      operationId: deleteOrgData
      tags: [orgs]
      summary: Delete all data for an organization
      description: >-
        Removes all jurisdictions, regulations, requirements, proposals,
        sources, and webhooks belonging to the specified org. Cannot delete
        `system` org data. Requires `admin` scope.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/XOrgId"
      responses:
        "204":
          description: Org data deleted
        "400":
          description: Cannot delete system org data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

# ==============================================================================
# Components
# ==============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string

    XOrgId:
      name: X-Org-Id
      in: header
      description: >-
        Optional organization context. When set, scopes data operations to
        this organization.
      required: false
      schema:
        type: string

    Limit:
      name: limit
      in: query
      description: Maximum number of items to return (default 50).
      schema:
        type: integer
        default: 50

    Offset:
      name: offset
      in: query
      description: Number of items to skip (default 0).
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Error ──────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error, statusCode]
      properties:
        error:
          type: string
        statusCode:
          type: integer

    # ── Health ─────────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── OAuth ──────────────────────────────────────────────────────────────────
    TokenRequest:
      type: object
      required: [grant_type]
      properties:
        grant_type:
          type: string
          enum: [client_credentials, password]
        client_id:
          type: string
        client_secret:
          type: string
        username:
          type: string
          description: Required for `password` grant.
        password:
          type: string
          description: Required for `password` grant.
        scope:
          type: string
          description: Space-separated scope list.

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in, scope]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds.
        scope:
          type: string
          description: Space-separated granted scopes.

    # ── Jurisdiction ───────────────────────────────────────────────────────────
    Jurisdiction:
      type: object
      required: [id, name, type, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [supranational, country, state]
        parentId:
          type: string
        iso3166:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateJurisdictionInput:
      type: object
      required: [name, type]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [supranational, country, state]
        parentId:
          type: string
        iso3166:
          type: string

    UpdateJurisdictionInput:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [supranational, country, state]
        parentId:
          type: string
        iso3166:
          type: string

    PaginatedJurisdictions:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Jurisdiction"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Regulation ─────────────────────────────────────────────────────────────
    Regulation:
      type: object
      required:
        - id
        - jurisdictionId
        - name
        - shortName
        - reference
        - url
        - enforcementDate
        - status
        - scope
        - sectors
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        jurisdictionId:
          type: string
        name:
          type: string
        shortName:
          type: string
        reference:
          type: string
        url:
          type: string
          format: uri
        enforcementDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, draft, repealed]
        scope:
          type: string
          enum: [public, private, all]
        sectors:
          type: array
          items:
            type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRegulationInput:
      type: object
      required:
        - jurisdictionId
        - name
        - shortName
        - reference
        - url
        - enforcementDate
        - status
        - scope
        - sectors
        - description
      properties:
        id:
          type: string
        jurisdictionId:
          type: string
        name:
          type: string
        shortName:
          type: string
        reference:
          type: string
        url:
          type: string
          format: uri
        enforcementDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, draft, repealed]
        scope:
          type: string
          enum: [public, private, all]
        sectors:
          type: array
          items:
            type: string
        description:
          type: string

    UpdateRegulationInput:
      type: object
      properties:
        jurisdictionId:
          type: string
        name:
          type: string
        shortName:
          type: string
        reference:
          type: string
        url:
          type: string
          format: uri
        enforcementDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, draft, repealed]
        scope:
          type: string
          enum: [public, private, all]
        sectors:
          type: array
          items:
            type: string
        description:
          type: string

    PaginatedRegulations:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Regulation"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Requirement ────────────────────────────────────────────────────────────
    Requirement:
      type: object
      required:
        - id
        - regulationId
        - wcagVersion
        - wcagLevel
        - wcagCriterion
        - obligation
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        regulationId:
          type: string
        wcagVersion:
          type: string
          enum: ["2.0", "2.1", "2.2"]
        wcagLevel:
          type: string
          enum: [A, AA, AAA]
        wcagCriterion:
          type: string
          example: "1.1.1"
        obligation:
          type: string
          enum: [mandatory, recommended, optional]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRequirementInput:
      type: object
      required:
        - regulationId
        - wcagVersion
        - wcagLevel
        - wcagCriterion
        - obligation
      properties:
        regulationId:
          type: string
        wcagVersion:
          type: string
          enum: ["2.0", "2.1", "2.2"]
        wcagLevel:
          type: string
          enum: [A, AA, AAA]
        wcagCriterion:
          type: string
        obligation:
          type: string
          enum: [mandatory, recommended, optional]
        notes:
          type: string

    UpdateRequirementInput:
      type: object
      properties:
        regulationId:
          type: string
        wcagVersion:
          type: string
          enum: ["2.0", "2.1", "2.2"]
        wcagLevel:
          type: string
          enum: [A, AA, AAA]
        wcagCriterion:
          type: string
        obligation:
          type: string
          enum: [mandatory, recommended, optional]
        notes:
          type: string

    PaginatedRequirements:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Requirement"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Compliance ─────────────────────────────────────────────────────────────
    ComplianceCheckRequest:
      type: object
      required: [jurisdictions, issues]
      properties:
        jurisdictions:
          type: array
          items:
            type: string
          minItems: 1
          description: Jurisdiction IDs to check against.
        issues:
          type: array
          items:
            $ref: "#/components/schemas/AccessibilityIssue"
          description: Accessibility issues to evaluate.
        includeOptional:
          type: boolean
          default: false
          description: Include optional requirements in the check.
        sectors:
          type: array
          items:
            type: string
          description: Filter regulations by sector.

    AccessibilityIssue:
      type: object
      required: [code, type, message, selector, context]
      properties:
        code:
          type: string
          description: Pa11y/WCAG issue code.
        type:
          type: string
          description: Issue severity (error, warning, notice).
        message:
          type: string
        selector:
          type: string
        context:
          type: string
          description: HTML context snippet.
        url:
          type: string

    ComplianceCheckResponse:
      type: object
      required: [matrix, annotatedIssues, summary]
      properties:
        matrix:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/JurisdictionResult"
          description: Keyed by jurisdiction ID.
        annotatedIssues:
          type: array
          items:
            $ref: "#/components/schemas/AnnotatedIssue"
        summary:
          $ref: "#/components/schemas/ComplianceSummary"

    JurisdictionResult:
      type: object
      required:
        - jurisdictionId
        - jurisdictionName
        - status
        - mandatoryViolations
        - recommendedViolations
        - optionalViolations
        - regulations
      properties:
        jurisdictionId:
          type: string
        jurisdictionName:
          type: string
        status:
          type: string
          enum: [pass, fail]
        mandatoryViolations:
          type: integer
        recommendedViolations:
          type: integer
        optionalViolations:
          type: integer
        regulations:
          type: array
          items:
            $ref: "#/components/schemas/RegulationResult"

    RegulationResult:
      type: object
      required:
        - regulationId
        - regulationName
        - shortName
        - status
        - enforcementDate
        - scope
        - violations
      properties:
        regulationId:
          type: string
        regulationName:
          type: string
        shortName:
          type: string
        status:
          type: string
          enum: [pass, fail]
        enforcementDate:
          type: string
        scope:
          type: string
        violations:
          type: array
          items:
            type: object
            required: [wcagCriterion, obligation, issueCount]
            properties:
              wcagCriterion:
                type: string
              obligation:
                type: string
                enum: [mandatory, recommended, optional]
              issueCount:
                type: integer

    AnnotatedIssue:
      type: object
      required: [code, wcagCriterion, wcagLevel, originalIssue, regulations]
      properties:
        code:
          type: string
        wcagCriterion:
          type: string
        wcagLevel:
          type: string
        originalIssue:
          type: object
          additionalProperties: true
        regulations:
          type: array
          items:
            type: object
            required:
              - regulationId
              - regulationName
              - shortName
              - jurisdictionId
              - obligation
              - enforcementDate
            properties:
              regulationId:
                type: string
              regulationName:
                type: string
              shortName:
                type: string
              jurisdictionId:
                type: string
              obligation:
                type: string
                enum: [mandatory, recommended, optional]
              enforcementDate:
                type: string

    ComplianceSummary:
      type: object
      required:
        - totalJurisdictions
        - passing
        - failing
        - totalMandatoryViolations
        - totalOptionalViolations
      properties:
        totalJurisdictions:
          type: integer
        passing:
          type: integer
        failing:
          type: integer
        totalMandatoryViolations:
          type: integer
        totalOptionalViolations:
          type: integer

    # ── Update Proposal ────────────────────────────────────────────────────────
    UpdateProposal:
      type: object
      required: [id, source, detectedAt, type, summary, proposedChanges, status, createdAt]
      properties:
        id:
          type: string
        source:
          type: string
        detectedAt:
          type: string
          format: date-time
        type:
          type: string
          enum: [new_regulation, amendment, repeal, new_requirement, new_jurisdiction]
        affectedRegulationId:
          type: string
        affectedJurisdictionId:
          type: string
        summary:
          type: string
        proposedChanges:
          $ref: "#/components/schemas/ProposedChange"
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewedBy:
          type: string
        reviewedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ProposedChange:
      type: object
      required: [action, entityType]
      properties:
        action:
          type: string
          enum: [create, update, delete]
        entityType:
          type: string
          enum: [jurisdiction, regulation, requirement]
        entityId:
          type: string
        before:
          type: object
          additionalProperties: true
        after:
          type: object
          additionalProperties: true

    CreateUpdateProposalInput:
      type: object
      required: [source, type, summary, proposedChanges]
      properties:
        source:
          type: string
        detectedAt:
          type: string
          format: date-time
        type:
          type: string
          enum: [new_regulation, amendment, repeal, new_requirement, new_jurisdiction]
        affectedRegulationId:
          type: string
        affectedJurisdictionId:
          type: string
        summary:
          type: string
        proposedChanges:
          oneOf:
            - $ref: "#/components/schemas/ProposedChange"
            - type: string
              description: JSON-serialised ProposedChange.

    PaginatedUpdateProposals:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UpdateProposal"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Monitored Source ───────────────────────────────────────────────────────
    MonitoredSource:
      type: object
      required: [id, name, url, type, schedule, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum: [html, rss, api]
        schedule:
          type: string
          enum: [daily, weekly, monthly]
        lastCheckedAt:
          type: string
          format: date-time
        lastContentHash:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateSourceInput:
      type: object
      required: [name, url, type, schedule]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum: [html, rss, api]
        schedule:
          type: string
          enum: [daily, weekly, monthly]

    ScanSourcesResponse:
      type: object
      required: [scanned, proposalsCreated, proposals]
      properties:
        scanned:
          type: integer
          description: Number of sources scanned.
        proposalsCreated:
          type: integer
          description: Number of change-detected proposals created.
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/UpdateProposal"

    # ── Webhook ────────────────────────────────────────────────────────────────
    Webhook:
      type: object
      required: [id, url, secret, events, active, createdAt]
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateWebhookInput:
      type: object
      required: [url, secret, events]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          items:
            type: string

    WebhookTestResponse:
      type: object
      properties:
        success:
          type: boolean
        statusCode:
          type: integer
          description: HTTP status from the webhook URL (only when success=true).
        error:
          type: string
          description: Error message (only when success=false).

    # ── User ───────────────────────────────────────────────────────────────────
    UserSafe:
      type: object
      required: [id, username, role, active, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [admin, editor, viewer]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateUserInput:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, editor, viewer]

    # ── OAuth Client ──────────────────────────────────────────────────────────
    OAuthClientSafe:
      type: object
      required: [id, name, scopes, grantTypes, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        grantTypes:
          type: array
          items:
            type: string
            enum: [client_credentials, authorization_code]
        redirectUris:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    CreateClientInput:
      type: object
      required: [name, scopes, grantTypes]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        grantTypes:
          type: array
          items:
            type: string
            enum: [client_credentials, authorization_code]
        redirectUris:
          type: array
          items:
            type: string

    # ── Seed ───────────────────────────────────────────────────────────────────
    SeedResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        jurisdictions:
          type: integer
        regulations:
          type: integer
        requirements:
          type: integer

    SeedStatus:
      type: object
      properties:
        jurisdictions:
          type: integer
        regulations:
          type: integer
        requirements:
          type: integer
