openapi: 3.1.0
info:
  title: Luqen API
  description: >-
    JSON API endpoints exposed by the Luqen. This spec covers only
    the machine-consumable JSON APIs (plugin management and org context), not
    the HTML/Handlebars UI routes.


    **GraphQL:** A GraphQL endpoint is also available at `/graphql`, with an
    interactive GraphiQL playground at `/graphiql`. The GraphQL API covers
    scans, issues, assignments, trends, compliance, users, teams, orgs, roles,
    and audit log. See `docs/reference/graphql-schema.md` for the full schema.
    GraphQL operations are not included in this OpenAPI spec (REST-only).
  version: 0.2.0
  license:
    name: MIT

servers:
  - url: http://localhost:5000
    description: Local development

security:
  - bearerAuth: []
  - apiKey: []

tags:
  - name: setup
    description: Initial setup and admin recovery
  - name: users
    description: Dashboard user management (admin)
  - name: account
    description: Self-service account operations
  - name: plugins
    description: Plugin lifecycle management
  - name: orgs
    description: Organization context switching
  - name: export
    description: Report export (CSV, PDF)
  - name: health
    description: Service health

paths:
  # ────────────────────────────────────────────────────────────────────────────
  # Health
  # ────────────────────────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getDashboardHealth
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, version]
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
              example:
                status: ok
                version: "0.1.0"

  # ────────────────────────────────────────────────────────────────────────────
  # Plugins
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/plugins:
    get:
      operationId: listPlugins
      tags: [plugins]
      summary: List installed plugins
      description: Returns all installed plugins with their current status and configuration.
      responses:
        "200":
          description: List of installed plugins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginRecord"

  /api/v1/plugins/registry:
    get:
      operationId: listPluginRegistry
      tags: [plugins]
      summary: List available plugins from registry
      description: >-
        Returns all plugins known to the registry, with an `installed` boolean
        indicating whether each one is currently installed.
      responses:
        "200":
          description: Registry entries with install status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegistryEntryWithStatus"

  /api/v1/plugins/install:
    post:
      operationId: installPlugin
      tags: [plugins]
      summary: Install a plugin by package name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageName]
              properties:
                packageName:
                  type: string
                  description: npm package name of the plugin.
                  example: "@luqen/plugin-auth-entra"
      responses:
        "201":
          description: Plugin installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "400":
          description: Invalid request or plugin not found in registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Installation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/plugins/{id}/config:
    patch:
      operationId: configurePlugin
      tags: [plugins]
      summary: Update plugin configuration
      parameters:
        - $ref: "#/components/parameters/PluginId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: object
                  additionalProperties: true
                  description: >-
                    Key-value configuration. Keys must match the plugin's
                    `configSchema` fields.
              example:
                config:
                  tenantId: "abc123"
                  clientId: "my-client"
                  clientSecret: "s3cret"
      responses:
        "200":
          description: Plugin configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "400":
          description: Config object missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Configuration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/plugins/{id}/activate:
    post:
      operationId: activatePlugin
      tags: [plugins]
      summary: Activate a plugin
      description: >-
        Marks the plugin as active. If the plugin code cannot start (e.g.
        missing required config), the plugin stays active with an `error`
        field describing what is needed. Saving configuration on an active
        plugin automatically retries starting the plugin code.
      parameters:
        - $ref: "#/components/parameters/PluginId"
      responses:
        "200":
          description: Plugin activated (may have error if config is incomplete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Activation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/plugins/{id}/deactivate:
    post:
      operationId: deactivatePlugin
      tags: [plugins]
      summary: Deactivate a plugin
      parameters:
        - $ref: "#/components/parameters/PluginId"
      responses:
        "200":
          description: Plugin deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deactivation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/plugins/{id}:
    delete:
      operationId: removePlugin
      tags: [plugins]
      summary: Remove (uninstall) a plugin
      description: >-
        Removes the plugin globally, including all org-specific copies.
        Deactivates running instances and deletes plugin files from disk.
      parameters:
        - $ref: "#/components/parameters/PluginId"
      responses:
        "204":
          description: Plugin removed (all org copies cascade-deleted)
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Removal failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/plugins/{id}/health:
    get:
      operationId: getPluginHealth
      tags: [plugins]
      summary: Check plugin health
      parameters:
        - $ref: "#/components/parameters/PluginId"
      responses:
        "200":
          description: Plugin health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginHealthResponse"
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ────────────────────────────────────────────────────────────────────────────
  # Setup & Admin Recovery
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/setup:
    post:
      operationId: createSetupUser
      tags: [setup]
      summary: Create a dashboard user via API key
      description: >-
        Bootstrap the first admin user or recover admin access when locked out
        of password-based login. Requires a valid API key via header (not
        session). Always available regardless of auth mode.
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: Username for the new dashboard user.
                  example: admin
                password:
                  type: string
                  format: password
                  minLength: 8
                  description: Password (minimum 8 characters).
                  example: SecurePass123!
                role:
                  type: string
                  enum: [viewer, user, developer, admin, executive]
                  default: admin
                  description: Role to assign. Defaults to `admin`.
            example:
              username: admin
              password: SecurePass123!
              role: admin
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupUserResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ────────────────────────────────────────────────────────────────────────────
  # Dashboard User Management (admin)
  # ────────────────────────────────────────────────────────────────────────────
  /admin/dashboard-users/{id}/activate:
    post:
      operationId: activateUser
      tags: [users]
      summary: Reactivate a deactivated dashboard user
      description: >-
        Restores login access for a previously deactivated user. Requires admin
        role. Returns the updated user row as an HTMX HTML fragment.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User activated (HTMX HTML fragment)
          content:
            text/html:
              schema:
                type: string
        "404":
          description: User not found
          content:
            text/html:
              schema:
                type: string

  /admin/dashboard-users/{id}/deactivate:
    post:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a dashboard user
      description: >-
        Prevents the user from logging in. Does not delete the user record.
        Requires admin role.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User deactivated (HTMX HTML fragment)
          content:
            text/html:
              schema:
                type: string
        "404":
          description: User not found
          content:
            text/html:
              schema:
                type: string

  /admin/dashboard-users/{id}/reset-password:
    get:
      operationId: getResetPasswordForm
      tags: [users]
      summary: Render the reset password modal
      description: >-
        Returns an HTMX HTML fragment containing a modal dialog for resetting
        the user's password. Requires admin role.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Reset password modal (HTMX HTML fragment)
          content:
            text/html:
              schema:
                type: string
        "404":
          description: User not found
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a dashboard user's password
      description: >-
        Admin-initiated password reset. The admin sets a new password directly
        (no email/token flow). Requires admin role.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [newPassword, confirmPassword]
              properties:
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                confirmPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "200":
          description: Password reset (HTMX toast fragment)
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Validation error (passwords don't match or too short)
          content:
            text/html:
              schema:
                type: string
        "404":
          description: User not found
          content:
            text/html:
              schema:
                type: string

  /admin/dashboard-users/{id}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Permanently delete a dashboard user
      description: >-
        Removes the user record from the database. References to this user in
        issue assignments, scan records, and other data remain as plain-text
        strings but the user account is permanently deleted. Requires admin role.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User deleted (HTMX toast fragment)
          content:
            text/html:
              schema:
                type: string
        "404":
          description: User not found
          content:
            text/html:
              schema:
                type: string

  /admin/dashboard-users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Change a dashboard user's role
      description: >-
        Updates the role for a dashboard user. Requires admin role.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [viewer, user, developer, admin, executive]
      responses:
        "200":
          description: Role updated (HTMX HTML fragment)
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Invalid role
          content:
            text/html:
              schema:
                type: string
        "404":
          description: User not found
          content:
            text/html:
              schema:
                type: string

  # ────────────────────────────────────────────────────────────────────────────
  # Self-service Account
  # ────────────────────────────────────────────────────────────────────────────
  /account:
    get:
      operationId: getProfile
      tags: [account]
      summary: View your profile page
      description: >-
        Renders the user's profile page showing account details (username, role,
        auth method) and a change password form (for password-based accounts).
      responses:
        "200":
          description: Profile page (HTML)
          content:
            text/html:
              schema:
                type: string
        "302":
          description: Redirect to login if not authenticated

  /account/change-password:
    post:
      operationId: changeOwnPassword
      tags: [account]
      summary: Change your own password
      description: >-
        Self-service password change for password-based accounts. Requires the
        current password for verification. Not available for API key or SSO
        authenticated sessions.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [currentPassword, newPassword, confirmPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                confirmPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "200":
          description: Profile page with success or error message (HTML)
          content:
            text/html:
              schema:
                type: string
        "302":
          description: Redirect to login if not authenticated

  # ────────────────────────────────────────────────────────────────────────────
  # Export
  # ────────────────────────────────────────────────────────────────────────────
  /api/v1/export/scans/{scanId}/report.pdf:
    get:
      operationId: exportScanPdf
      tags: [export]
      summary: Download scan report as PDF
      description: >-
        Generates a PDF of the scan report using PDFKit server-side rendering.
      parameters:
        - name: scanId
          in: path
          required: true
          description: Scan record ID.
          schema:
            type: string
      responses:
        "200":
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: PDF generation not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ────────────────────────────────────────────────────────────────────────────
  # Org context
  # ────────────────────────────────────────────────────────────────────────────
  /orgs/switch:
    post:
      operationId: switchOrg
      tags: [orgs]
      summary: Switch the current org context
      description: >-
        Sets the active organization in the user's session. Passing `system`
        or an empty `orgId` clears the org context. On success the server
        redirects back to the `Referer` header (or `/`).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                orgId:
                  type: string
                  description: >-
                    Organization ID to switch to. Use `system` or omit to
                    clear org context.
          application/json:
            schema:
              type: object
              properties:
                orgId:
                  type: string
      responses:
        "302":
          description: Redirect to previous page
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: User does not belong to the requested organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orgs/current:
    get:
      operationId: getCurrentOrg
      tags: [orgs]
      summary: Get current org context
      description: >-
        Returns the currently active organization, its details, and all
        organizations the authenticated user belongs to.
      responses:
        "200":
          description: Current org context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgContextResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ==============================================================================
# Webhooks
# ==============================================================================
webhooks:
  scanComplete:
    post:
      summary: Scan completed
      description: Fired when an accessibility scan finishes successfully.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookScanEvent'
  scanFailed:
    post:
      summary: Scan failed
      description: Fired when an accessibility scan fails.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookScanEvent'

# ==============================================================================
# Components
# ==============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token obtained from the compliance service OAuth endpoint.

    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        API key generated on first dashboard start (solo auth mode). Shown
        once in server logs.

  parameters:
    PluginId:
      name: id
      in: path
      required: true
      description: Plugin ID (typically the npm package name slug).
      schema:
        type: string

    UserId:
      name: id
      in: path
      required: true
      description: Dashboard user UUID.
      schema:
        type: string
        format: uuid

  schemas:
    # ── Setup ─────────────────────────────────────────────────────────────────
    SetupUserResponse:
      type: object
      required: [message, user]
      properties:
        message:
          type: string
          example: 'User "admin" created with role "admin".'
        user:
          type: object
          required: [id, username, role]
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            role:
              type: string
              enum: [viewer, user, developer, admin, executive]

    # ── Error ──────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Plugin ─────────────────────────────────────────────────────────────────
    PluginRecord:
      type: object
      required: [id, packageName, type, version, config, status, installedAt]
      properties:
        id:
          type: string
        packageName:
          type: string
          example: "@luqen/plugin-auth-entra"
        type:
          type: string
          enum: [auth, notification, storage, scanner, git-host]
        version:
          type: string
        config:
          type: object
          additionalProperties: true
          description: Current plugin configuration (secrets are masked).
        status:
          type: string
          enum: [inactive, active, error, install-failed, unhealthy]
        orgId:
          type: string
          description: >-
            Organization ID this plugin belongs to, or `system` for the
            global (default) installation.
          example: system
        installedAt:
          type: string
          format: date-time
        activatedAt:
          type: string
          format: date-time
        error:
          type: string
          description: >-
            Error message. When status is `active` with an error, the plugin
            is enabled but its code could not start (typically missing config).
            When status is `error`, the plugin failed critically.

    RegistryEntryWithStatus:
      type: object
      required: [name, displayName, type, version, description, packageName, installed]
      properties:
        name:
          type: string
        displayName:
          type: string
        type:
          type: string
          enum: [auth, notification, storage, scanner, git-host]
        version:
          type: string
        description:
          type: string
        packageName:
          type: string
        icon:
          type: string
        installed:
          type: boolean
          description: Whether this plugin is currently installed.

    PluginHealthResponse:
      type: object
      description: >-
        Health check result. Shape depends on the plugin's `healthCheck()`
        implementation; typically includes a boolean status.
      additionalProperties: true

    # ── Org context ────────────────────────────────────────────────────────────
    OrgContextResponse:
      type: object
      required: [currentOrgId, currentOrg, userOrgs]
      properties:
        currentOrgId:
          type: string
          nullable: true
          description: Active org ID, or `null` when no org is selected.
        currentOrg:
          nullable: true
          $ref: "#/components/schemas/Organization"
        userOrgs:
          type: array
          items:
            $ref: "#/components/schemas/Organization"

    Organization:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Webhook events ────────────────────────────────────────────────────
    WebhookScanEvent:
      type: object
      required: [event, timestamp, scan]
      properties:
        event:
          type: string
          enum: [scan.complete, scan.failed]
        timestamp:
          type: string
          format: date-time
        scan:
          type: object
          required: [id, siteUrl, status]
          properties:
            id:
              type: string
            siteUrl:
              type: string
            status:
              type: string
              enum: [completed, failed]
            totalIssues:
              type: integer
            errors:
              type: integer
            warnings:
              type: integer
            notices:
              type: integer
            pagesScanned:
              type: integer
            createdAt:
              type: string
              format: date-time
            completedAt:
              type: string
              format: date-time
        signature:
          type: string
          description: HMAC-SHA256 signature (X-Luqen-Signature header)
