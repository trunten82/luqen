# GitHub Actions — Build and Test Pipeline (AWS / general)
# Triggers on push to master/develop and PRs
# Matrix strategy builds both packages in parallel
# Caches node_modules for faster runs

name: Build and Test

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Detect which packages changed
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      build-core: ${{ steps.detect.outputs.build-core }}
      build-compliance: ${{ steps.detect.outputs.build-compliance }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse --root)
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BUILD_CORE=false
          BUILD_COMPLIANCE=false

          # Root-level changes trigger full rebuild
          if echo "$CHANGED" | grep -qE '^(package\.json|package-lock\.json|tsconfig.*\.json)$'; then
            BUILD_CORE=true
            BUILD_COMPLIANCE=true
          fi

          if echo "$CHANGED" | grep -q '^packages/core/'; then
            BUILD_CORE=true
          fi

          if echo "$CHANGED" | grep -q '^packages/compliance/'; then
            BUILD_COMPLIANCE=true
          fi

          echo "build-core=$BUILD_CORE" >> "$GITHUB_OUTPUT"
          echo "build-compliance=$BUILD_COMPLIANCE" >> "$GITHUB_OUTPUT"
          echo "Build core: $BUILD_CORE  Build compliance: $BUILD_COMPLIANCE"

  # ─────────────────────────────────────────────
  # Job 2: Build and test (matrix per package)
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build and test — ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: core
            should-run: ${{ needs.detect-changes.outputs.build-core }}
          - package: compliance
            should-run: ${{ needs.detect-changes.outputs.build-compliance }}

    # Skip packages that did not change
    if: |
      matrix.should-run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache workspace node_modules
        uses: actions/cache@v4
        id: cache-root
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Cache package node_modules
        uses: actions/cache@v4
        with:
          path: packages/${{ matrix.package }}/node_modules
          key: ${{ runner.os }}-node-modules-${{ matrix.package }}-${{ hashFiles(format('packages/{0}/package.json', matrix.package)) }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ matrix.package }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        working-directory: packages/${{ matrix.package }}
        run: npm run lint

      - name: Build
        working-directory: packages/${{ matrix.package }}
        run: npm run build

      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: npm run test

      - name: Run tests with coverage
        working-directory: packages/${{ matrix.package }}
        run: npm run test:coverage

      - name: Enforce 80% coverage threshold
        run: |
          node -e "
            const fs = require('fs');
            const path = 'packages/${{ matrix.package }}/coverage/coverage-summary.json';
            if (!fs.existsSync(path)) { console.error('Coverage summary not found'); process.exit(1); }
            const summary = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const total = summary.total;
            const threshold = 80;
            let failed = false;
            for (const metric of ['lines', 'statements', 'functions', 'branches']) {
              const pct = total[metric].pct;
              const status = pct >= threshold ? 'PASS' : 'FAIL';
              console.log(metric + ': ' + pct + '% (' + status + ')');
              if (pct < threshold) failed = true;
            }
            if (failed) { console.error('Coverage below ' + threshold + '% threshold'); process.exit(1); }
            console.log('Coverage thresholds met.');
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 3: All checks gate (required for PR merge)
  # ─────────────────────────────────────────────
  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-test
    if: always()
    steps:
      - name: Check build-and-test result
        run: |
          if [ "${{ needs.build-and-test.result }}" = "failure" ]; then
            echo "One or more package builds/tests failed."
            exit 1
          fi
          echo "All checks passed."
