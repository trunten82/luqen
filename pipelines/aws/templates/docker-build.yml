# GitHub Actions — Reusable workflow: Docker build + push to ECR
# Inputs:
#   service          — "compliance" or "core"
#   ecr-repository   — ECR repository URI, e.g. "123456789.dkr.ecr.eu-west-1.amazonaws.com/luqen-compliance"
#   image-tag        — tag to apply (default: github.sha)
#   aws-region       — AWS region (default: "eu-west-1")

name: Docker build and push to ECR

on:
  workflow_call:
    inputs:
      service:
        description: Package to build (compliance or core)
        required: true
        type: string
      ecr-repository:
        description: Full ECR repository URI
        required: true
        type: string
      image-tag:
        description: Docker image tag
        required: false
        type: string
        default: ${{ github.sha }}
      aws-region:
        description: AWS region
        required: false
        type: string
        default: eu-west-1
    secrets:
      AWS_ROLE_ARN:
        description: IAM role ARN for OIDC authentication to AWS
        required: true
    outputs:
      image-uri:
        description: Full image URI including tag
        value: ${{ jobs.docker-build.outputs.image-uri }}

jobs:
  docker-build:
    name: Build and push ${{ inputs.service }}
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx (for layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: packages/${{ inputs.service }}
          file: packages/${{ inputs.service }}/Dockerfile
          push: true
          tags: |
            ${{ inputs.ecr-repository }}:${{ inputs.image-tag }}
            ${{ inputs.ecr-repository }}:latest
          build-args: |
            NODE_VERSION=20
          cache-from: type=registry,ref=${{ inputs.ecr-repository }}:cache
          cache-to: type=registry,ref=${{ inputs.ecr-repository }}:cache,mode=max

      - name: Output image URI
        run: |
          echo "image-uri=${{ inputs.ecr-repository }}:${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
